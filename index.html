<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIKHORETSK ELITE DROP | GOD MODE</title>
    <style>
        /* === ПЕРЕМЕННЫЕ И ШРИФТЫ === */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Roboto:wght@300;700&display=swap');

        :root {
            --primary: #00ff88;
            --secondary: #12141d;
            --accent-red: #ff3e3e;
            --accent-gold: #ffcc00;
            --rarity-gray: #b0c3d9;
            --rarity-blue: #4b69ff;
            --rarity-purple: #8847ff;
            --rarity-pink: #d32ce6;
            --rarity-red: #eb4b4b;
            --rarity-gold: #caab05;
            --rarity-pitbike: #00ff88;
            --shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* === GLOBAL RESET === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #08090c;
            color: #e1e1e1;
            font-family: 'Roboto', sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a1c25 0%, #08090c 100%);
            min-height: 100vh;
        }

        /* === СКРОЛЛБАР === */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #08090c; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        /* === HEADER === */
        .app-header {
            position: fixed; top: 0; width: 100%; height: 90px;
            background: rgba(18, 20, 29, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid #222;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; z-index: 1000;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }

        .brand { display: flex; align-items: center; gap: 15px; }
        .logo-box {
            width: 50px; height: 50px; background: var(--primary);
            clip-path: polygon(25% 0%, 100% 0%, 75% 100%, 0% 100%);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron', sans-serif; color: #000; font-weight: 900;
        }
        .logo-text { font-family: 'Orbitron', sans-serif; font-size: 22px; letter-spacing: 2px; }
        .logo-text span { color: var(--primary); text-shadow: 0 0 15px var(--primary); }

        .nav-center { display: flex; background: #000; padding: 5px; border-radius: 15px; border: 1px solid #333; }
        .nav-btn {
            padding: 12px 25px; border-radius: 12px; cursor: pointer;
            font-weight: 700; font-size: 13px; color: #666; transition: 0.3s;
            text-transform: uppercase; border: none; background: transparent;
        }
        .nav-btn:hover { color: #fff; }
        .nav-btn.active { background: #222; color: var(--primary); box-shadow: inset 0 0 10px rgba(0,255,136,0.1); }

        .stats-box { display: flex; align-items: center; gap: 20px; }
        .balance-pill {
            background: #1a1c26; border: 1px solid #333; padding: 10px 20px;
            border-radius: 50px; display: flex; align-items: center; gap: 15px;
        }
        .balance-pill .val { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 18px; }
        .add-btn {
            width: 35px; height: 35px; background: var(--primary); border: none;
            border-radius: 50%; cursor: pointer; font-size: 20px; font-weight: 900;
            transition: 0.3s;
        }
        .add-btn:hover { transform: scale(1.1) rotate(90deg); box-shadow: 0 0 20px var(--primary); }

        /* === MAIN CONTENT === */
        .container { margin-top: 120px; padding: 0 40px 40px 40px; max-width: 1600px; margin-left: auto; margin-right: auto; }
        .page { display: none; animation: fadeIn 0.6s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* === CASES GRID === */
        .grid-header { margin-bottom: 40px; border-left: 5px solid var(--primary); padding-left: 20px; }
        .grid-header h1 { font-size: 40px; text-transform: uppercase; font-family: 'Orbitron', sans-serif; }

        .cases-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .case-item {
            background: rgba(20, 22, 30, 0.6); border: 1px solid #222; border-radius: 25px;
            padding: 40px 20px; text-align: center; position: relative; overflow: hidden;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer;
        }
        .case-item::before {
            content: ''; position: absolute; top: -100%; left: -100%; width: 50%; height: 300%;
            background: rgba(255,255,255,0.03); transform: rotate(45deg); transition: 0.5s;
        }
        .case-item:hover::before { left: 150%; }
        .case-item:hover { transform: translateY(-15px); border-color: var(--primary); box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .case-item img { width: 180px; margin-bottom: 20px; filter: drop-shadow(0 10px 20px #000); transition: 0.3s; }
        .case-item:hover img { transform: scale(1.1) translateY(-10px); }
        .case-item .name { font-family: 'Orbitron', sans-serif; font-size: 20px; margin-bottom: 15px; }
        .case-item .price {
            display: inline-block; padding: 10px 25px; background: var(--primary);
            color: #000; border-radius: 12px; font-weight: 900; font-size: 16px;
        }

        /* === INVENTORY === */
        .inventory-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .item-card {
            background: #12141d; border-radius: 20px; padding: 20px; text-align: center;
            border: 1px solid #222; position: relative; transition: 0.3s;
        }
        .item-card:hover { border-color: #444; background: #161822; }
        .item-card img { width: 130px; height: 100px; object-fit: contain; margin-bottom: 15px; }
        .item-card .rarity-bar { position: absolute; bottom: 0; left: 0; width: 100%; height: 5px; border-radius: 0 0 20px 20px; }
        .item-card .title { font-size: 13px; color: #aaa; margin-bottom: 10px; height: 32px; overflow: hidden; }
        .item-card .cost { font-weight: 900; color: var(--primary); font-size: 18px; margin-bottom: 15px; }
        .item-btn-sell {
            width: 100%; padding: 8px; background: rgba(255, 62, 62, 0.1);
            border: 1px solid var(--accent-red); color: var(--accent-red); border-radius: 8px;
            cursor: pointer; font-weight: 700; transition: 0.2s;
        }
        .item-btn-sell:hover { background: var(--accent-red); color: #fff; }

        /* === CRAFTING / GARAGE === */
        .garage-wrapper { display: flex; gap: 30px; }
        .garage-inv { flex: 2; background: rgba(0,0,0,0.3); border-radius: 30px; padding: 30px; height: 70vh; overflow-y: auto; border: 1px solid #222; }
        .garage-bench { flex: 1.2; background: #12141d; border-radius: 30px; padding: 40px; border: 2px solid #333; position: sticky; top: 120px; height: fit-content; }
        .slot-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 40px; }
        .slot-box { 
            aspect-ratio: 1; background: #08090c; border: 2px dashed #444; border-radius: 15px;
            display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;
        }
        .slot-box.filled { border-style: solid; border-color: var(--primary); box-shadow: 0 0 15px rgba(0,255,136,0.1); }
        .slot-box img { width: 80%; }
        .bench-info { text-align: center; }
        .bench-price { font-size: 30px; font-weight: 900; color: var(--primary); margin-bottom: 10px; font-family: 'Orbitron'; }
        .craft-btn-big {
            width: 100%; padding: 25px; border-radius: 20px; border: none;
            background: linear-gradient(45deg, var(--primary), #00cc6a);
            color: #000; font-size: 20px; font-weight: 900; text-transform: uppercase;
            cursor: pointer; transition: 0.3s; font-family: 'Orbitron';
        }
        .craft-btn-big:disabled { filter: grayscale(1); opacity: 0.3; cursor: not-allowed; }
        .craft-btn-big:hover:not(:disabled) { box-shadow: 0 0 40px var(--primary); transform: scale(1.02); }

        /* === ROULETTE === */
        .modal {
            display: none; position: fixed; inset: 0; z-index: 9999;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(15px);
            align-items: center; justify-content: center; flex-direction: column;
        }
        .roulette-container { width: 100%; max-width: 1200px; position: relative; }
        .roulette-view {
            height: 250px; background: #000; border: 2px solid #333;
            border-radius: 30px; position: relative; overflow: hidden;
            box-shadow: inset 0 0 100px #000, 0 20px 60px rgba(0,0,0,0.7);
        }
        .roulette-tape { display: flex; position: absolute; left: 0; top: 25px; transition: transform 9s cubic-bezier(0.05, 0.9, 0.1, 1); }
        .pointer-v {
            position: absolute; left: 50%; top: -10px; bottom: -10px; width: 4px;
            background: var(--primary); z-index: 10; transform: translateX(-50%);
            box-shadow: 0 0 30px var(--primary); border-radius: 2px;
        }
        .tape-item {
            min-width: 200px; height: 200px; margin: 0 10px; background: #111;
            border-radius: 20px; display: flex; flex-direction: column; align-items: center;
            justify-content: center; position: relative;
        }
        .tape-item img { width: 140px; filter: drop-shadow(0 10px 10px #000); }
        .tape-item .rarity-tag { position: absolute; bottom: 0; left: 0; right: 0; height: 6px; border-radius: 0 0 20px 20px; }

        /* === NOTIFICATIONS === */
        #toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 10000; }
        .toast {
            background: #1a1c26; border: 1px solid var(--primary); padding: 20px 30px;
            border-radius: 15px; margin-top: 10px; animation: slideIn 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 15px;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

    </style>
</head>
<body>

<header class="app-header">
    <div class="brand">
        <div class="logo-box">T</div>
        <div class="logo-text">TIKHORETSK<span>DROP</span></div>
    </div>
    <nav class="nav-center">
        <button class="nav-btn active" onclick="go('cases')">Кейсы</button>
        <button class="nav-btn" onclick="go('garage')">Гараж</button>
        <button class="nav-btn" onclick="go('inv')">Инвентарь</button>
    </nav>
    <div class="stats-box">
        <div class="balance-pill">
            <span class="val" id="bal-val">0</span>
            <button class="add-btn" onclick="addCash()">+</button>
        </div>
    </div>
</header>

<div class="container">
    
    <div id="p-cases" class="page active">
        <div class="grid-header">
            <h1>Магазин контейнеров</h1>
            <p>Испытай свою удачу прямо сейчас</p>
        </div>
        <div class="cases-grid" id="cases-wrap"></div>
    </div>

    <div id="p-inv" class="page">
        <div class="grid-header" style="display:flex; justify-content:space-between; align-items:center;">
            <div>
                <h1>Мой склад</h1>
                <p>Всего предметов: <span id="inv-count">0</span> | Ценность: <span id="inv-worth">0</span> ₽</p>
            </div>
            <button class="item-btn-sell" style="width:200px; padding:20px;" onclick="sellAll()">Слить всё</button>
        </div>
        <div class="inventory-list" id="inv-wrap"></div>
    </div>

    <div id="p-garage" class="page">
        <div class="grid-header">
            <h1>Инженерный отдел</h1>
            <p>Сборка кастомных Питбайков из запчастей</p>
        </div>
        <div class="garage-wrapper">
            <div class="garage-inv" id="garage-inv-wrap"></div>
            <div class="garage-bench">
                <div class="slot-grid" id="bench-slots"></div>
                <div class="bench-info">
                    <p style="color:#666; margin-bottom:5px;">Итоговая стоимость материалов:</p>
                    <div class="bench-price"><span id="bench-cost">0</span> ₽</div>
                    <button class="craft-btn-big" id="do-craft" disabled onclick="execCraft()">Собрать байк</button>
                    <p style="margin-top:20px; font-size:12px; color:#444;">*При крафте шанс на x10 прибыль или x0.2 убыток</p>
                </div>
            </div>
        </div>
    </div>

</div>

<div id="m-roulette" class="modal">
    <div style="text-align:center; margin-bottom:50px;">
        <h2 id="r-status" style="font-family:'Orbitron'; font-size:35px; color:#fff;">ОТКРЫВАЕМ...</h2>
    </div>
    <div class="roulette-container">
        <div class="roulette-view">
            <div class="pointer-v"></div>
            <div class="roulette-tape" id="r-tape"></div>
        </div>
    </div>
    <div id="r-actions" style="display:none; margin-top:50px; gap:20px;">
        <button class="craft-btn-big" style="width:250px;" onclick="claimDrop()">Забрать</button>
        <button class="item-btn-sell" style="width:250px; border-radius:20px; font-size:18px;" id="r-sell-btn">Продать</button>
    </div>
</div>

<div id="toast-container"></div>

<script>
    // === КОНФИГУРАЦИЯ БАЗЫ ===
    const SKINS = [
        { name: "AWP | Dragon Lore", p: 1400000, r: "gold", img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot621FAR17PLfYQJD_9W7m5a0mvLwOq7c2G1Qv5Nzi-zE8I_0iVLgr0FvYm_3cY-QJwI3M1vV-Fm9ku_v1JS4v57PyXNmu3E8pSGK46_SpgM/256fx256f" },
        { name: "M4A4 | Howl", p: 900000, r: "gold", img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpou-6kejhjxszFJTwW09Kzm7-FmP7mDLbUkmne5bp9i_vG8In03A3t_hVvY2v1IdSXIw87YF_Q-Vm9wr-7jJS06JrBznVqv3V0t3vfgVXp1uIDv_6Z/256fx256f" },
        { name: "AK-47 | Wild Lotus", p: 850000, r: "red", img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot7HxfDhjxszJemkV092lnYmGmOHLPr7Vn35cppR32u_E9on23AewqRA9MT_6I4-ScVVoYF7U81m9xue715S67cmYn3RmsnN2-z5iux79_hMA/256fx256f" },
        { name: "AK-47 | Fire Serpent", p: 180000, r: "red", img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot7HxfDhnwMzJemkV08y5nY6fqPv9NLPF2GkEupYp0-uVpImsjQy1r0Q-Z2jycI6UdlRoaQuG_wC7yezqgMK_v5XBzCNqvHR05XqOgVXp1j82GjI-/256fx256f" },
        { name: "Butterfly Knife | Doppler", p: 160000, r: "gold", img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpovbSs_fV3fszYTxRS49KJlZG0mP74O6_KqWdY781lxO2T8I_yiQ3tqUE9ZWqnLdTGIVM5ZV_Y-FS_lL-805S8vc-fyXZjvyQisS2L1xK1g0weZ-Brm7XAHqPBUW4/256fx256f" },
        { name: "M4A1-S | Printstream", p: 45000, r: "red", img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpou-6kejhz2v_Nfz5H_uO1gb-Gw_alIITBhGJf_NZlmOzA-LP5gVO8v11kMmH3LYWdd1A5YliD_Qe9kry508W67c6dwHBm7ikjsX2OnhG11QYMMLK0wHk/256fx256f" },
        { name: "USP-S | Kill Confirmed", p: 12000, r: "pink", img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpoo6m1FBRp3_bGcjhQ09-jq5WYh8j3KqnUjlRZ7cRnk6eVrY6i2VblqEJtZmyncI_Ad1JvM1yCqFO8wezuhZTuusvNyyFruCU8pSGKp_5_oA/256fx256f" },
        { name: "Glock-18 | Moon Rise", p: 800, r: "purple", img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgposbaqKAxf0v73cCxX7eOwmIWInOTxMrXukmJW4NE_3LrEpomg2gLtrhBqYD-mIIeWIAA_YlyD_we-kry6hMC56cjPyXVlpnMmsCqOlwv330-F6sYwNg/256fx256f" },
        { name: "P250 | Sand Dune", p: 5, r: "gray", img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpopujwezhz3f-AClT9_tZ0goWOhsjiMrvQk31F5cJ70-qYrImi0AblqERsNmn1cYTGJwM2NAzSrwS9wrvqgsO8vsnAz2wj5HdfGk2qHA/256fx256f" }
    ];

    const COLORS = {
        gray: "#b0c3d9", blue: "#4b69ff", purple: "#8847ff",
        pink: "#d32ce6", red: "#eb4b4b", gold: "#caab05", pitbike: "#00ff88"
    };

    const CASES = [
        { name: "Кейс Новичка", p: 50, items: SKINS.filter(s => s.p < 1000) },
        { name: "Армейский Сбор", p: 500, items: SKINS.filter(s => s.p < 15000) },
        { name: "Мажорный Кейс", p: 15000, items: SKINS.filter(s => s.p > 10000) },
        { name: "Легенда Тихорецка", p: 250000, items: SKINS.filter(s => s.r === 'red' || s.r === 'gold') }
    ];

    // === СОСТОЯНИЕ ===
    let state = {
        bal: Number(localStorage.getItem('tg_bal')) || 50000,
        inv: JSON.parse(localStorage.getItem('tg_inv')) || [],
        benchIdx: [],
        currentDrop: null
    };

    // === ЛОГИКА ===
    function sync() {
        document.getElementById('bal-val').innerText = state.bal.toLocaleString() + " ₽";
        localStorage.setItem('tg_bal', state.bal);
        localStorage.setItem('tg_inv', JSON.stringify(state.inv));
        renderInv();
        renderGarage();
    }

    function go(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('p-' + page).classList.add('active');
        event.target.classList.add('active');
        if(page === 'garage') state.benchIdx = [];
        sync();
    }

    // --- РЕНДЕР КЕЙСОВ ---
    const cWrap = document.getElementById('cases-wrap');
    CASES.forEach((c, i) => {
        cWrap.innerHTML += `
            <div class="case-item" onclick="openCase(${i})">
                <img src="https://cdn-icons-png.flaticon.com/512/679/679821.png">
                <div class="name">${c.name}</div>
                <div class="price">${c.p.toLocaleString()} ₽</div>
            </div>
        `;
    });

    function openCase(idx) {
        const c = CASES[idx];
        if(state.bal < c.p) return toast("Недостаточно средств!", "red");
        
        state.bal -= c.p;
        state.currentDrop = c.items[Math.floor(Math.random() * c.items.length)];
        
        document.getElementById('m-roulette').style.display = 'flex';
        const tape = document.getElementById('r-tape');
        tape.style.transition = 'none';
        tape.style.transform = 'translateX(0)';
        tape.innerHTML = '';

        for(let i=0; i<80; i++) {
            const s = (i === 65) ? state.currentDrop : SKINS[Math.floor(Math.random()*SKINS.length)];
            tape.innerHTML += `
                <div class="tape-item">
                    <img src="${s.img}">
                    <div class="rarity-tag" style="background:${COLORS[s.r]}"></div>
                </div>
            `;
        }

        setTimeout(() => {
            tape.style.transition = 'transform 8s cubic-bezier(0.05, 0.9, 0.1, 1)';
            tape.style.transform = `translateX(-${(65 * 220) - (window.innerWidth / 2) + 110}px)`;
        }, 50);

        setTimeout(() => {
            document.getElementById('r-status').innerText = state.currentDrop.name;
            document.getElementById('r-status').style.color = COLORS[state.currentDrop.r];
            document.getElementById('r-actions').style.display = 'flex';
            document.getElementById('r-sell-btn').innerText = `Продать за ${state.currentDrop.p} ₽`;
            document.getElementById('r-sell-btn').onclick = () => {
                state.bal += state.currentDrop.p;
                closeModal();
                toast("Предмет продан!");
            };
        }, 8500);
        sync();
    }

    function claimDrop() {
        state.inv.push({...state.currentDrop, id: Date.now()});
        closeModal();
        toast("Предмет добавлен в инвентарь");
    }

    function closeModal() {
        document.getElementById('m-roulette').style.display = 'none';
        document.getElementById('r-actions').style.display = 'none';
        document.getElementById('r-status').innerText = "ОТКРЫВАЕМ...";
        document.getElementById('r-status').style.color = "#fff";
        sync();
    }

    // --- РЕНДЕР ИНВЕНТАРЯ ---
    function renderInv() {
        const wrap = document.getElementById('inv-wrap');
        wrap.innerHTML = '';
        let worth = 0;
        state.inv.sort((a,b) => b.p - a.p).forEach((item, i) => {
            worth += item.p;
            wrap.innerHTML += `
                <div class="item-card">
                    <img src="${item.img}">
                    <div class="title">${item.name}</div>
                    <div class="cost">${item.p.toLocaleString()} ₽</div>
                    <button class="item-btn-sell" onclick="sellItem(${i})">Продать</button>
                    <div class="rarity-bar" style="background:${COLORS[item.r]}"></div>
                </div>
            `;
        });
        document.getElementById('inv-count').innerText = state.inv.length;
        document.getElementById('inv-worth').innerText = worth.toLocaleString();
    }

    function sellItem(i) {
        state.bal += state.inv[i].p;
        state.inv.splice(i, 1);
        sync();
    }

    function sellAll() {
        state.inv.forEach(s => state.bal += s.p);
        state.inv = [];
        sync();
    }

    // --- ГАРАЖ / КРАФТ ---
    function renderGarage() {
        const iWrap = document.getElementById('garage-inv-wrap');
        const bSlots = document.getElementById('bench-slots');
        iWrap.innerHTML = '';
        bSlots.innerHTML = '';

        state.inv.forEach((item, i) => {
            const isSel = state.benchIdx.includes(i);
            iWrap.innerHTML += `
                <div class="item-card" style="opacity:${isSel?0.3:1}; cursor:pointer" onclick="toggleBench(${i})">
                    <img src="${item.img}">
                    <div class="cost">${item.p} ₽</div>
                </div>
            `;
        });

        let total = 0;
        for(let i=0; i<10; i++) {
            if(state.benchIdx[i] !== undefined) {
                const s = state.inv[state.benchIdx[i]];
                total += s.p;
                bSlots.innerHTML += `<div class="slot-box filled"><img src="${s.img}"></div>`;
            } else {
                bSlots.innerHTML += `<div class="slot-box"></div>`;
            }
        }
        document.getElementById('bench-cost').innerText = total.toLocaleString();
        document.getElementById('do-craft').disabled = state.benchIdx.length < 5;
    }

    function toggleBench(i) {
        const p = state.benchIdx.indexOf(i);
        if(p > -1) state.benchIdx.splice(p, 1);
        else if(state.benchIdx.length < 10) state.benchIdx.push(i);
        sync();
    }

    function execCraft() {
        let totalInput = 0;
        state.benchIdx.sort((a,b) => b-a).forEach(i => {
            totalInput += state.inv[i].p;
            state.inv.splice(i, 1);
        });

        const mult = Math.random() < 0.7 ? (0.3 + Math.random()*0.7) : (1.1 + Math.random()*9);
        const finalPrice = Math.floor(totalInput * mult);
        
        const bike = {
            name: `Питбайк [${mult > 1 ? 'PRO' : 'SCRAP'}]`,
            p: finalPrice,
            r: 'pitbike',
            img: "https://cdn-icons-png.flaticon.com/512/3202/3202926.png"
        };

        state.inv.push(bike);
        toast(`Крафт завершен! Получен байк за ${finalPrice} ₽`, "gold");
        state.benchIdx = [];
        sync();
    }

    // --- ВСПОМОГАТЕЛЬНОЕ ---
    function addCash() {
        state.bal += 10000;
        toast("+10,000 ₽ на базу!");
        sync();
    }

    function toast(msg, color = "var(--primary)") {
        const container = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = 'toast';
        t.style.borderColor = color;
        t.innerHTML = `<span>⚡</span> ${msg}`;
        container.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    sync();
</script>

</body>
</html>
