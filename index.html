<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tikhoretsk Drop | Ultimate Case Simulator</title>
    <style>
        /* === ОСНОВНЫЕ СТИЛИ И ПЕРЕМЕННЫЕ === */
        :root {
            --bg: #0a0c10;
            --bg-panel: #11151c;
            --bg-card: #181c25;
            --accent: #00ff88;
            --accent-hover: #00cc6a;
            --text: #e2e8f0;
            --text-muted: #8b949e;
            
            --gold: #F4C430;
            --red: #eb4b4b;
            --pink: #d32ce6;
            --purple: #8847ff;
            --blue: #4b69ff;
            --grey: #b0c3d9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; }

        /* === НАВИГАЦИЯ И ШАПКА === */
        header {
            background: var(--bg-panel);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #202632;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { font-size: 26px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        .logo span { color: var(--accent); }

        .nav-links { display: flex; gap: 20px; }
        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            padding: 5px 10px;
        }
        .nav-link:hover, .nav-link.active { color: var(--accent); }

        .balance-container {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--accent);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
        }
        .balance-container span { color: var(--accent); }

        /* === СТРАНИЦЫ (ВКЛАДКИ) === */
        .page { display: none; padding: 40px 5%; max-width: 1400px; margin: 0 auto; min-height: 80vh; }
        .page.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .page-title { font-size: 32px; margin-bottom: 30px; border-left: 5px solid var(--accent); padding-left: 15px; }

        /* === СЕТКА КЕЙСОВ === */
        .case-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; }

        .case-card {
            background: var(--bg-card);
            border: 2px solid #202632;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        .case-card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 10px 30px rgba(0, 255, 136, 0.15); }
        .case-card img { width: 140px; height: 140px; object-fit: contain; filter: drop-shadow(0 0 10px rgba(255,255,255,0.1)); margin-bottom: 15px; border-radius: 10px; }
        .case-card h3 { font-size: 20px; margin-bottom: 10px; }
        .case-card .price { color: var(--accent); font-weight: 800; font-size: 22px; }

        /* === МОДАЛЬНЫЕ ОКНА (ПРЕВЬЮ И РУЛЕТКА) === */
        .modal-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 12, 16, 0.98);
            z-index: 2000;
            align-items: center; justify-content: center; flex-direction: column;
        }

        .preview-container {
            width: 90%; max-width: 1000px; background: var(--bg-panel);
            border-radius: 20px; padding: 30px; position: relative;
            border: 1px solid #333; max-height: 90vh; overflow-y: auto;
        }

        .preview-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px; margin-top: 25px;
        }

        .preview-item {
            background: var(--bg-card); padding: 10px; border-radius: 8px;
            text-align: center; border-bottom: 4px solid var(--grey);
        }
        .preview-item img { width: 80px; height: 80px; object-fit: contain; }
        .preview-item .p-name { font-size: 11px; margin-top: 5px; height: 30px; overflow: hidden; }
        .preview-item .p-price { color: var(--accent); font-weight: bold; font-size: 14px; }

        .roulette-header { font-size: 36px; margin-bottom: 30px; font-weight: bold; }

        .roulette-wrapper {
            width: 100%; max-width: 1100px; height: 200px;
            background: var(--bg-card);
            border: 2px solid #333;
            border-radius: 15px;
            position: relative; overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.8) inset;
        }

        .center-line {
            position: absolute; left: 50%; top: 0; bottom: 0; width: 4px;
            background: var(--gold); z-index: 10; transform: translateX(-50%);
            box-shadow: 0 0 15px var(--gold);
        }

        .tape { display: flex; position: absolute; left: 0; top: 10px; transition: transform 7s cubic-bezier(0.15, 0, 0.05, 1); }

        .item {
            min-width: 160px; height: 176px; margin: 0 5px;
            background: #1e232d; border-radius: 10px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-bottom: 6px solid var(--grey); position: relative;
        }
        .item img { width: 110px; height: 110px; object-fit: contain; }
        .item .item-name { font-size: 12px; margin-top: 10px; text-align: center; padding: 0 5px; color: #ccc; }

        .roulette-actions { margin-top: 40px; display: none; gap: 20px; }
        
        button {
            padding: 15px 40px; font-size: 18px; font-weight: bold; cursor: pointer;
            border: none; border-radius: 8px; transition: 0.2s;
        }
        .btn-green { background: var(--accent); color: #000; }
        .btn-green:hover { background: var(--accent-hover); box-shadow: 0 0 20px rgba(0,255,136,0.4); }
        .btn-red { background: var(--red); color: #fff; }
        .btn-red:hover { box-shadow: 0 0 20px rgba(235,75,75,0.4); }

        /* === ИНВЕНТАРЬ И ПРОФИЛЬ === */
        .profile-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .stats-box { display: flex; gap: 30px; font-size: 18px; color: var(--text-muted); }
        .stats-box span { color: var(--text); font-weight: bold; font-size: 22px; }

        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .inv-item {
            background: var(--bg-card); padding: 15px; border-radius: 10px;
            text-align: center; border-bottom: 5px solid var(--grey);
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .inv-item img { width: 100px; height: 100px; object-fit: contain; margin: 0 auto 10px; }
        .inv-item .name { font-size: 13px; margin-bottom: 5px; height: 35px; overflow: hidden; }
        .inv-item .price { font-weight: bold; color: var(--accent); margin-bottom: 10px; }
        .btn-sell-small { background: var(--red); color: white; padding: 8px; border-radius: 5px; cursor: pointer; border: none; width: 100%; font-weight: bold; }

        /* === АПГРЕЙДЫ === */
        .upgrade-container { display: flex; gap: 40px; justify-content: center; align-items: stretch; margin-top: 50px; }
        .upg-side {
            background: var(--bg-card); border-radius: 15px; padding: 30px; width: 35%;
            display: flex; flex-direction: column; align-items: center; border: 2px solid #202632;
        }
        .upg-center { display: flex; flex-direction: column; justify-content: center; align-items: center; width: 30%; gap: 20px; }
        .upg-slot {
            width: 200px; height: 200px; border: 2px dashed #444; border-radius: 15px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            margin-bottom: 20px; cursor: pointer; transition: 0.2s;
        }
        .upg-slot img { width: 140px; height: 140px; object-fit: contain; }
        .upgrade-wheel {
            width: 180px; height: 180px; border-radius: 50%;
            background: conic-gradient(var(--accent) 0%, var(--accent) var(--chance), #202632 var(--chance), #202632 100%);
            position: relative; display: flex; justify-content: center; align-items: center;
            border: 5px solid #111;
        }
        .wheel-arrow {
            width: 4px; height: 90px; background: var(--red);
            position: absolute; top: 0; left: 50%; transform-origin: bottom center;
            transform: translateX(-50%) rotate(0deg); z-index: 10;
        }

        /* Выбор предмета */
        #mini-inv-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 3000; align-items: center; justify-content: center;
        }
        .mini-inv-content { background: var(--bg-panel); width: 80%; max-height: 80%; overflow-y: auto; padding: 30px; border-radius: 15px; }

    </style>
</head>
<body>

<header>
    <div class="logo">Tikhoretsk<span>Drop</span></div>
    <div class="nav-links">
        <a class="nav-link active" onclick="switchPage('cases')">Кейсы</a>
        <a class="nav-link" onclick="switchPage('upgrade')">Апгрейды</a>
        <a class="nav-link" onclick="switchPage('svo')">Контракт SVO</a>
        <a class="nav-link" onclick="switchPage('profile'); renderProfile()">Профиль</a>
    </div>
    <div class="balance-container">
        Баланс: <span id="balance-display">100000</span> ₽ 
        <button onclick="depositMoney()" style="padding: 2px 8px; margin-left: 10px; cursor: pointer; background: var(--accent); color: #000; border-radius: 4px; border: none; font-size: 16px; font-weight: bold;">+</button>
    </div>
</header>

<div id="page-cases" class="page active">
    <h1 class="page-title">Премиум Кейсы & Chicken Gun</h1>
    <div class="case-grid" id="cases-grid"></div>
</div>

<div id="preview-modal" class="modal-overlay">
    <div class="preview-container">
        <h2 id="prev-title" style="margin-bottom: 10px;">Название кейса</h2>
        <p id="prev-desc" style="color: var(--text-muted); margin-bottom: 20px;">Содержимое кейса (Окуп до 5x):</p>
        <div class="preview-grid" id="prev-grid"></div>
        <div style="margin-top: 30px; display: flex; gap: 20px; justify-content: center;">
            <button class="btn-green" id="btn-open-from-prev">Открыть за <span id="prev-price">0</span> ₽</button>
            <button class="btn-red" onclick="closePreview()">Назад</button>
        </div>
    </div>
</div>

<div id="roulette-modal" class="modal-overlay">
    <div class="roulette-header" id="roulette-status">Открытие кейса...</div>
    <div class="roulette-wrapper">
        <div class="center-line"></div>
        <div class="tape" id="roulette-tape"></div>
    </div>
    <div class="roulette-actions" id="roulette-actions">
        <button class="btn-green" onclick="closeRoulette()">Забрать в инвентарь</button>
        <button class="btn-red" id="btn-sell-now" onclick="sellWonItem()">Продать за <span id="sell-price-span">0</span> ₽</button>
    </div>
</div>

<div id="page-profile" class="page">
    <div class="profile-header">
        <h1 class="page-title">Твой Инвентарь</h1>
        <div class="stats-box">
            <div>Предметов: <span id="stat-count">0</span></div>
            <div>Общая стоимость: <span id="stat-value">0</span> ₽</div>
        </div>
        <button class="btn-red" onclick="sellAll()">Продать всё</button>
    </div>
    <div class="inventory-grid" id="inventory-grid"></div>
</div>

<div id="page-upgrade" class="page">
    <h1 class="page-title">Апгрейд</h1>
    <div class="upgrade-container">
        <div class="upg-side">
            <h3>Твой предмет</h3>
            <div class="upg-slot" id="upg-my-slot" onclick="openMiniInv('upgrade')"><div style="color: #666; font-size: 40px;">+</div></div>
            <div id="upg-my-price" style="font-size: 24px; font-weight: bold; color: var(--text-muted);">0 ₽</div>
        </div>
        <div class="upg-center">
            <div class="upgrade-wheel" id="upg-wheel" style="--chance: 0%;"><div class="wheel-arrow" id="wheel-arrow"></div><div class="wheel-center" id="upg-chance" style="font-size:28px; font-weight:bold; color:var(--accent); z-index:5;">0%</div></div>
            <button class="btn-green" id="btn-do-upgrade" onclick="executeUpgrade()" disabled>Апгрейд!</button>
        </div>
        <div class="upg-side">
            <h3>Цель</h3>
            <div class="upg-slot" id="upg-target-slot" style="cursor: default;"><div style="color: #444; font-size: 30px;">?</div></div>
            <div id="upg-target-price" style="font-size: 24px; font-weight: bold; color: var(--accent);">0 ₽</div>
        </div>
    </div>
</div>

<div id="page-svo" class="page">
    <h1 class="page-title">Контракт SVO</h1>
    <div id="svo-slots-container" style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; min-height: 200px; border: 2px dashed #333; padding: 20px; width: 100%; border-radius: 15px; margin-bottom: 20px;"></div>
    <div style="text-align:center;">
        <button class="btn-green" onclick="openMiniInv('svo')">Добавить предметы</button>
        <button class="btn-red" id="btn-do-svo" onclick="executeSvo()" disabled>Подписать контракт!</button>
        <button class="btn-red" style="background:#444;" onclick="clearSvo()">Очистить</button>
    </div>
</div>

<div id="mini-inv-modal">
    <div class="mini-inv-content">
        <h2 style="margin-bottom: 20px; display: flex; justify-content: space-between;">Выбери предмет <button class="btn-red" onclick="document.getElementById('mini-inv-modal').style.display='none'">X</button></h2>
        <div class="inventory-grid" id="mini-inv-grid"></div>
    </div>
</div>

<script>
    // === БАЗА ДАННЫХ ===
    const rarities = {
        gold: { color: "var(--gold)", name: "Тайное (Нож)" },
        red: { color: "var(--red)", name: "Тайное" },
        pink: { color: "var(--pink)", name: "Засекреченное" },
        purple: { color: "var(--purple)", name: "Запрещенное" },
        blue: { color: "var(--blue)", name: "Армейское" },
        grey: { color: "var(--grey)", name: "Ширпотреб" }
    };

    const globalSkins = [
        // МИЛЛИОННЫЕ СКИНЫ
        { name: "Karambit | Case Hardened (Blue Gem)", price: 5000000, rarity: "gold", img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpovbSs_fV3fszYTxRS49KJlZG0mPhzP77mm29u5Mx2gv2P8Y-mjVDk-0VvYm7zcY-ddgRrY1_R_Fm3kO7v08S0vJzPyXU36Scl7S3D30vgidm9EwY/360fx360f" },
        { name: "AWP | Dragon Lore (FN)", price: 3500000, rarity: "gold", img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot621FAR17PLfYQJD_9W7m5a0mvLwOq7c2G1Qv5Nzi-zE8I_0iVLgr0FvYm_3cY-QJwI3M1vV-Fm9ku_v1JS4v57PyXNmu3E8pSGK46_SpgM/360fx360f" },
        { name: "M4A4 | Howl (StatTrak)", price: 2200000, rarity: "gold", img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpou-6kejhjxszFJTwW09Kzm7-FmP7mDLbUkmne5bp9i_vG8In03A3t_hVvY2v1IdSXIw87YF_Q-Vm9wr-7jJS06JrBznVqv3V0t3vfgVXp1uIDv_6Z/360fx360f" },
        { name: "AK-47 | Wild Lotus", price: 950000, rarity: "red", img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot7HxfDhnwMzJemkV08y5nY6fqPv9NLPF2GkEupYp0-uVpImsjQy1r0Q-Z2jycI6UdlRoaQuG_wC7yezqgMK_v5XBzCNqvHR05XqOgVXp1j82GjI-/360fx360f" },
        { name: "Денис Петух (Gold Edition)", price: 500000, rarity: "pink", img: "https://cdn-icons-png.flaticon.com/512/1864/1864509.png" },
        { name: "Butterfly Knife | Doppler", price: 280000, rarity: "gold", img: "https://api.dicebear.com/7.x/bottts/svg?seed=butterfly" },
        { name: "AWP | Gungnir", price: 1100000, rarity: "red", img: "https://api.dicebear.com/7.x/bottts/svg?seed=gungnir" },
        // КЛАССИКА
        { name: "AK-47 | Slate", price: 800, rarity: "purple", img: "https://api.dicebear.com/7.x/bottts/svg?seed=slate" },
        { name: "P250 | Sand Dune", price: 15, rarity: "grey", img: "https://api.dicebear.com/7.x/bottts/svg?seed=sand" }
    ];

    // Генерим еще 500 скинов для "мяса"
    for(let i=0; i<500; i++) {
        globalSkins.push({
            name: `Скин #${i+100}`,
            price: Math.floor(Math.random() * 60000) + 50,
            rarity: i % 10 === 0 ? "red" : (i % 5 === 0 ? "pink" : "blue"),
            img: `https://api.dicebear.com/7.x/bottts/svg?seed=item${i}`
        });
    }

    const casesData = [
        { id: 1, name: "Бомж Кейс", price: 100, img: "https://api.dicebear.com/7.x/fun-emoji/svg?seed=poor" },
        { id: 2, name: "ОГЭ 2026", price: 2500, img: "https://api.dicebear.com/7.x/fun-emoji/svg?seed=oge" },
        { id: 3, name: "Тихорецкий Экспресс", price: 15000, img: "https://api.dicebear.com/7.x/fun-emoji/svg?seed=train" },
        { id: 4, name: "Chicken Gun Box", price: 75000, img: "https://api.dicebear.com/7.x/bottts/svg?seed=chicken" },
        { id: 5, name: "Кейс Миллионера", price: 1000000, img: "https://api.dicebear.com/7.x/fun-emoji/svg?seed=gold" }
    ];

    // === СОСТОЯНИЕ ===
    let balance = localStorage.getItem('th_bal') ? parseInt(localStorage.getItem('th_bal')) : 100000;
    let inventory = JSON.parse(localStorage.getItem('th_inv')) || [];
    let svoItems = [];
    let selectedUpgItemIdx = null;
    let currentWonItem = null;

    function save() {
        localStorage.setItem('th_bal', balance);
        localStorage.setItem('th_inv', JSON.stringify(inventory));
        document.getElementById('balance-display').innerText = balance.toLocaleString();
    }
    save();

    function switchPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(`page-${pageId}`).classList.add('active');
    }

    // === РЕНДЕР КЕЙСОВ ===
    const casesGrid = document.getElementById('cases-grid');
    casesData.forEach(c => {
        casesGrid.innerHTML += `
            <div class="case-card" onclick="previewCase(${c.id})">
                <img src="${c.img}">
                <h3>${c.name}</h3>
                <div class="price">${c.price.toLocaleString()} ₽</div>
            </div>
        `;
    });

    // === ПРЕВЬЮ КЕЙСА ===
    function previewCase(id) {
        const c = casesData.find(x => x.id === id);
        const modal = document.getElementById('preview-modal');
        const grid = document.getElementById('prev-grid');
        
        document.getElementById('prev-title').innerText = c.name;
        document.getElementById('prev-price').innerText = c.price.toLocaleString();
        
        // Показываем предметы: от 0.1x до 10x (чтобы было видно и дешевое, и дорогое)
        const possible = globalSkins.filter(s => s.price >= c.price * 0.05 && s.price <= c.price * 10).slice(0, 20);
        
        grid.innerHTML = '';
        possible.forEach(item => {
            grid.innerHTML += `
                <div class="preview-item" style="border-bottom-color: ${rarities[item.rarity].color}">
                    <img src="${item.img}">
                    <div class="p-name">${item.name}</div>
                    <div class="p-price">${item.price.toLocaleString()} ₽</div>
                </div>
            `;
        });

        document.getElementById('btn-open-from-prev').onclick = () => { closePreview(); openCase(id); };
        modal.style.display = 'flex';
    }

    function closePreview() { document.getElementById('preview-modal').style.display = 'none'; }

    // === МЕХАНИКА КЕЙСОВ (Шансы) ===
    function getWeightedItem(casePrice) {
        const rand = Math.random() * 100;
        let minMult, maxMult;

        if (rand < 75) { minMult = 0.1; maxMult = 0.8; } // Слив (75%)
        else if (rand < 90) { minMult = 0.8; maxMult = 1.1; } // Почти в ноль (15%)
        else { minMult = 1.1; maxMult = 5.0; } // Окуп (10%, макс 5x)

        const targetPriceMin = casePrice * minMult;
        const targetPriceMax = casePrice * maxMult;

        let pool = globalSkins.filter(s => s.price >= targetPriceMin && s.price <= targetPriceMax);
        if (pool.length === 0) pool = [globalSkins[Math.floor(Math.random()*globalSkins.length)]];
        
        return pool[Math.floor(Math.random() * pool.length)];
    }

    function openCase(id) {
        const c = casesData.find(x => x.id === id);
        if (balance < c.price) return alert("Баланс пополни!");
        balance -= c.price; save();

        const modal = document.getElementById('roulette-modal');
        const tape = document.getElementById('roulette-tape');
        const actions = document.getElementById('roulette-actions');
        
        modal.style.display = 'flex';
        actions.style.display = 'none';
        tape.style.transition = 'none';
        tape.style.transform = 'translateX(0)';
        
        let tapeHTML = '';
        currentWonItem = getWeightedItem(c.price);

        for(let i=0; i<80; i++) {
            let item = i === 70 ? currentWonItem : globalSkins[Math.floor(Math.random()*globalSkins.length)];
            tapeHTML += `<div class="item" style="border-bottom-color: ${rarities[item.rarity].color}"><img src="${item.img}"><div class="item-name">${item.name}</div></div>`;
        }
        tape.innerHTML = tapeHTML;

        setTimeout(() => {
            tape.style.transition = 'transform 7s cubic-bezier(0.15, 0, 0.05, 1)';
            tape.style.transform = `translateX(-${70 * 170 - 450}px)`;
        }, 100);

        setTimeout(() => {
            document.getElementById('roulette-status').innerText = `Выпало: ${currentWonItem.name}`;
            document.getElementById('sell-price-span').innerText = currentWonItem.price.toLocaleString();
            actions.style.display = 'flex';
        }, 7500);
    }

    function closeRoulette() {
        inventory.push(currentWonItem); save();
        document.getElementById('roulette-modal').style.display = 'none';
        document.getElementById('roulette-status').innerText = "Открытие кейса...";
    }

    function sellWonItem() {
        balance += currentWonItem.price; save();
        document.getElementById('roulette-modal').style.display = 'none';
    }

    // === ИНВЕНТАРЬ ===
    function renderProfile() {
        const grid = document.getElementById('inventory-grid');
        grid.innerHTML = '';
        let total = 0;
        inventory.forEach((item, idx) => {
            total += item.price;
            grid.innerHTML += `
                <div class="inv-item" style="border-bottom-color: ${rarities[item.rarity].color}">
                    <img src="${item.img}">
                    <div class="name">${item.name}</div>
                    <div class="price">${item.price.toLocaleString()} ₽</div>
                    <button class="btn-sell-small" onclick="sellFromInv(${idx})">Продать</button>
                </div>`;
        });
        document.getElementById('stat-count').innerText = inventory.length;
        document.getElementById('stat-value').innerText = total.toLocaleString();
    }

    function sellFromInv(idx) {
        balance += inventory[idx].price;
        inventory.splice(idx, 1);
        save(); renderProfile();
    }

    function sellAll() {
        inventory.forEach(i => balance += i.price);
        inventory = []; save(); renderProfile();
    }

    // === АПГРЕЙДЫ ===
    function openMiniInv(mode) {
        const grid = document.getElementById('mini-inv-grid');
        grid.innerHTML = '';
        inventory.forEach((item, idx) => {
            grid.innerHTML += `
                <div class="inv-item" onclick="selectItemFor('${mode}', ${idx})" style="cursor:pointer; border-bottom-color:${rarities[item.rarity].color}">
                    <img src="${item.img}">
                    <div class="name">${item.name}</div>
                    <div class="price">${item.price.toLocaleString()} ₽</div>
                </div>`;
        });
        document.getElementById('mini-inv-modal').style.display = 'flex';
    }

    function selectItemFor(mode, idx) {
        if (mode === 'upgrade') {
            selectedUpgItemIdx = idx;
            const item = inventory[idx];
            document.getElementById('upg-my-slot').innerHTML = `<img src="${item.img}">`;
            document.getElementById('upg-my-price').innerText = item.price.toLocaleString() + " ₽";
            
            // Цель: следующий по цене предмет из базы
            const target = globalSkins.filter(s => s.price > item.price).sort((a,b) => a.price - b.price)[0] || globalSkins[0];
            document.getElementById('upg-target-slot').innerHTML = `<img src="${target.img}">`;
            document.getElementById('upg-target-price').innerText = target.price.toLocaleString() + " ₽";
            
            const chance = Math.min(95, Math.floor((item.price / target.price) * 100));
            document.getElementById('upg-chance').innerText = chance + "%";
            document.getElementById('upg-wheel').style.setProperty('--chance', chance + "%");
            document.getElementById('btn-do-upgrade').disabled = false;
        } else if (mode === 'svo') {
            if (!svoItems.includes(idx)) {
                svoItems.push(idx);
                renderSvoSlots();
            }
        }
        document.getElementById('mini-inv-modal').style.display = 'none';
    }

    function executeUpgrade() {
        const item = inventory[selectedUpgItemIdx];
        const targetPrice = parseInt(document.getElementById('upg-target-price').innerText.replace(/\s/g, ''));
        const target = globalSkins.find(s => s.price === targetPrice);
        const chance = parseInt(document.getElementById('upg-chance').innerText);
        
        const arrow = document.getElementById('wheel-arrow');
        const randDeg = 1800 + Math.floor(Math.random() * 360);
        arrow.style.transition = 'transform 3s cubic-bezier(0.15, 0, 0.05, 1)';
        arrow.style.transform = `translateX(-50%) rotate(${randDeg}deg)`;

        setTimeout(() => {
            const finalDeg = randDeg % 360;
            const winRange = (chance / 100) * 360;
            if (finalDeg <= winRange) {
                inventory.splice(selectedUpgItemIdx, 1);
                inventory.push(target);
                alert("УСПЕХ!");
            } else {
                inventory.splice(selectedUpgItemIdx, 1);
                alert("СГОРЕЛ!");
            }
            save(); location.reload();
        }, 3200);
    }

    // === КОНТРАКТ SVO ===
    function renderSvoSlots() {
        const container = document.getElementById('svo-slots-container');
        container.innerHTML = '';
        svoItems.forEach(idx => {
            const item = inventory[idx];
            container.innerHTML += `<div class="inv-item" style="width:120px; border-bottom-color:${rarities[item.rarity].color}"><img src="${item.img}" style="width:60px; height:60px;"></div>`;
        });
        document.getElementById('btn-do-svo').disabled = svoItems.length < 3;
    }

    function clearSvo() { svoItems = []; renderSvoSlots(); }

    function executeSvo() {
        const totalInput = svoItems.reduce((acc, idx) => acc + inventory[idx].price, 0);
        const multipliers = [0.2, 0.5, 1, 1.5, 2, 5];
        const randomMult = multipliers[Math.floor(Math.random() * multipliers.length)];
        const winAmount = Math.floor(totalInput * randomMult);
        const winSkin = globalSkins.reduce((prev, curr) => Math.abs(curr.price - winAmount) < Math.abs(prev.price - winAmount) ? curr : prev);

        svoItems.sort((a, b) => b - a).forEach(idx => inventory.splice(idx, 1));
        inventory.push(winSkin);
        save();
        alert(`SVO Контракт: x${randomMult}! Получен: ${winSkin.name}`);
        location.reload();
    }

    function depositMoney() {
        let val = prompt("Сколько закинуть?");
        if(val) { balance += parseInt(val); save(); }
    }
</script>
</body>
</html>
