<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pitbike Drop | Ultimate Case Simulator</title>
    <style>
        :root {
            --bg: #0a0c10; --bg-panel: #11151c; --bg-card: #181c25;
            --accent: #00ff88; --accent-hover: #00cc6a;
            --text: #e2e8f0; --text-muted: #8b949e;
            --gold: #F4C430; --red: #eb4b4b; --pink: #d32ce6;
            --purple: #8847ff; --blue: #4b69ff; --grey: #b0c3d9;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; }

        /* HEADER */
        header {
            background: var(--bg-panel); padding: 15px 5%; display: flex;
            justify-content: space-between; align-items: center;
            border-bottom: 2px solid #202632; position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 26px; font-weight: 900; text-transform: uppercase; }
        .logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 20px; }
        .nav-link { color: var(--text-muted); text-decoration: none; font-size: 18px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { color: var(--accent); }
        .balance-container { background: rgba(0, 255, 136, 0.1); border: 1px solid var(--accent); padding: 10px 20px; border-radius: 8px; font-weight: bold; }

        /* PAGES */
        .page { display: none; padding: 40px 5%; max-width: 1400px; margin: 0 auto; min-height: 80vh; }
        .page.active { display: block; }
        .page-title { font-size: 32px; margin-bottom: 30px; border-left: 5px solid var(--accent); padding-left: 15px; }

        /* CASE GRID */
        .case-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        .case-card {
            background: var(--bg-card); border: 2px solid #202632; border-radius: 15px;
            padding: 20px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .case-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .case-card img { width: 100%; height: 150px; object-fit: contain; margin-bottom: 15px; }
        .case-card .price { color: var(--accent); font-weight: 800; font-size: 20px; }

        /* MODALS */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; flex-direction: column;
        }
        .preview-container {
            width: 90%; max-width: 1000px; background: var(--bg-panel); border-radius: 20px;
            padding: 30px; max-height: 85vh; overflow-y: auto; border: 1px solid #333;
        }
        .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; margin: 20px 0; }
        .preview-item { background: var(--bg-card); padding: 10px; border-radius: 8px; text-align: center; border-bottom: 3px solid #555; }
        .preview-item img { width: 70px; height: 70px; object-fit: contain; }

        /* ROULETTE */
        .roulette-wrapper {
            width: 100%; max-width: 1000px; height: 200px; background: var(--bg-card);
            border: 2px solid #333; border-radius: 15px; position: relative; overflow: hidden; margin: 20px 0;
        }
        .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 4px; background: var(--gold); z-index: 10; transform: translateX(-50%); }
        .tape { display: flex; position: absolute; left: 0; top: 10px; transition: transform 7s cubic-bezier(0.1, 0, 0.05, 1); }
        .item { min-width: 160px; height: 180px; margin: 0 5px; background: #1e232d; display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 5px solid #ccc; }
        .item img { width: 110px; height: 110px; object-fit: contain; }

        /* UTILS */
        .btn-green { background: var(--accent); color: #000; padding: 12px 30px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-red { background: var(--red); color: #fff; padding: 12px 30px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .inv-item { background: var(--bg-card); padding: 15px; border-radius: 10px; text-align: center; border-bottom: 4px solid #555; }
        .inv-item img { width: 90px; height: 90px; object-fit: contain; }

        /* UPGRADE & SVO */
        .upgrade-container { display: flex; gap: 30px; justify-content: center; align-items: center; margin-top: 40px; }
        .upg-side { background: var(--bg-card); padding: 25px; border-radius: 15px; width: 300px; text-align: center; }
        .upg-slot { width: 180px; height: 180px; border: 2px dashed #444; margin: 15px auto; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .upg-slot img { max-width: 100%; }
        .upgrade-wheel { width: 150px; height: 150px; border-radius: 50%; border: 10px solid #222; position: relative; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<header>
    <div class="logo">Tikhoretsk<span>Drop</span></div>
    <div class="nav-links">
        <div class="nav-link active" onclick="switchPage('cases')">Кейсы</div>
        <div class="nav-link" onclick="switchPage('upgrade')">Апгрейд</div>
        <div class="nav-link" onclick="switchPage('svo')">SVO Контракт</div>
        <div class="nav-link" onclick="switchPage('profile'); renderProfile()">Профиль</div>
    </div>
    <div class="balance-container">Баланс: <span id="balance-display">0</span> ₽</div>
</header>

<div id="page-cases" class="page active">
    <h1 class="page-title">Выбор кейса</h1>
    <div class="case-grid" id="cases-grid"></div>
</div>

<div id="page-profile" class="page">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1 class="page-title">Инвентарь</h1>
        <button class="btn-red" onclick="sellAll()">Продать всё</button>
    </div>
    <div class="inventory-grid" id="inventory-grid"></div>
</div>

<div id="page-upgrade" class="page">
    <h1 class="page-title">Апгрейд предметов</h1>
    <div class="upgrade-container">
        <div class="upg-side">
            <h3>Твой предмет</h3>
            <div class="upg-slot" id="upg-my-slot" onclick="openMiniInv('upgrade')"> Нажми для выбора </div>
            <div id="upg-my-price">0 ₽</div>
        </div>
        <div style="text-align: center;">
            <div class="upgrade-wheel" id="upg-wheel" style="background: conic-gradient(var(--accent) 0%, #222 0%);">
                <div id="upg-chance" style="font-size: 20px; font-weight: bold;">0%</div>
            </div>
            <button class="btn-green" style="margin-top:20px;" onclick="doUpgrade()">Апгрейд!</button>
        </div>
        <div class="upg-side">
            <h3>Цель</h3>
            <div class="upg-slot" id="upg-target-slot" style="cursor:default;"> ? </div>
            <div id="upg-target-price">0 ₽</div>
        </div>
    </div>
</div>

<div id="page-svo" class="page">
    <h1 class="page-title">SVO Контракт (3 предмета)</h1>
    <div id="svo-slots" style="display:flex; gap:20px; justify-content:center; margin-bottom:30px; min-height:150px; border:1px dashed #444; padding:20px;"></div>
    <div style="text-align:center;">
        <button class="btn-green" onclick="openMiniInv('svo')">Добавить предмет</button>
        <button class="btn-red" onclick="doSvo()">Подписать контракт</button>
    </div>
</div>

<div id="preview-modal" class="modal-overlay">
    <div class="preview-container">
        <h2 id="prev-name">Кейс</h2>
        <div class="preview-grid" id="prev-grid"></div>
        <div style="text-align:center;">
            <button class="btn-green" id="btn-open-now">Открыть за 0 ₽</button>
            <button class="btn-red" onclick="closePreview()">Закрыть</button>
        </div>
    </div>
</div>

<div id="roulette-modal" class="modal-overlay">
    <h2 id="roulette-status">Крутим...</h2>
    <div class="roulette-wrapper">
        <div class="center-line"></div>
        <div class="tape" id="tape"></div>
    </div>
    <div id="roulette-actions" style="display:none; gap:20px;">
        <button class="btn-green" onclick="collectItem()">В инвентарь</button>
        <button class="btn-red" id="btn-sell-won" onclick="sellWon()">Продать</button>
    </div>
</div>

<div id="mini-inv-modal" class="modal-overlay">
    <div class="preview-container">
        <h2>Выбери предмет <button class="btn-red" style="float:right" onclick="closeMiniInv()">X</button></h2>
        <div class="inventory-grid" id="mini-inv-grid" style="margin-top:20px;"></div>
    </div>
</div>

<script>
    // БАЗА ДАННЫХ
    const rarities = {
        gold: { color: "var(--gold)", label: "Золотое" },
        red: { color: "var(--red)", label: "Тайное" },
        pink: { color: "var(--pink)", label: "Засекреченное" },
        purple: { color: "var(--purple)", label: "Запрещенное" },
        blue: { color: "var(--blue)", label: "Армейское" }
    };

    const globalSkins = [
        { name: "Karambit | Case Hardened (Blue Gem)", price: 5000000, rarity: "gold", img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpovbSs_fV3fszYTxRS49KJlZG0mPhzP77mm29u5Mx2gv2P8Y-mjVDk-0VvYm7zcY-ddgRrY1_R_Fm3kO7v08S0vJzPyXU36Scl7S3D30vgidm9EwY/360fx360f" },
        { name: "AWP | Dragon Lore", price: 3800000, rarity: "gold", img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot621FAR17PLfYQJD_9W7m5a0mvLwOq7c2G1Qv5Nzi-zE8I_0iVLgr0FvYm_3cY-QJwI3M1vV-Fm9ku_v1JS4v57PyXNmu3E8pSGK46_SpgM/360fx360f" },
        { name: "M4A4 | Howl", price: 1500000, rarity: "gold", img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpou-6kejhjxszFJTwW09Kzm7-FmP7mDLbUkmne5bp9i_vG8In03A3t_hVvY2v1IdSXIw87YF_Q-Vm9wr-7jJS06JrBznVqv3V0t3vfgVXp1uIDv_6Z/360fx360f" },
        { name: "Butterfly | Doppler (Sapphire)", price: 800000, rarity: "gold", img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpovbSs_fV3fszYTxRS49KJlZG0mPhzP77mm29u5Mx2gv2P8Y-mjVDk-0VvYm7zcY-ddgRrY1_R_Fm3kO7v08S0vJzPyXU36Scl7S3D30vgidm9EwY/360fx360f" },
        { name: "AK-47 | Wild Lotus", price: 950000, rarity: "red", img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot7HxfDhnwMzJemkV08y5nY6fqPv9NLPF2GkEupYp0-uVpImsjQy1r0Q-Z2jycI6UdlRoaQuG_wC7yezqgMK_v5XBzCNqvHR05XqOgVXp1j82GjI-/360fx360f" },
        { name: "Денис Петух", price: 15000, rarity: "pink", img: "https://cdn-icons-png.flaticon.com/512/1864/1864509.png" },
        { name: "Тихорецкий Жигуль", price: 45000, rarity: "red", img: "https://api.dicebear.com/7.x/bottts/svg?seed=car" }
    ];

    // Добиваем базу до 200 предметов для разнообразия
    for(let i=0; i<193; i++) {
        globalSkins.push({
            name: `Скин #${i+1}`, price: Math.floor(Math.random() * 30000) + 50,
            rarity: i % 10 === 0 ? "red" : (i % 5 === 0 ? "pink" : "blue"),
            img: `https://api.dicebear.com/7.x/bottts/svg?seed=skin${i}`
        });
    }

    const cases = [
        { id: 1, name: "Бомж Кейс", price: 100, img: "https://api.dicebear.com/7.x/fun-emoji/svg?seed=poor" },
        { id: 2, name: "Тихорецкий Драйв", price: 1500, img: "https://api.dicebear.com/7.x/fun-emoji/svg?seed=car" },
        { id: 3, name: "Chicken Gun Box", price: 10000, img: "https://api.dicebear.com/7.x/bottts/svg?seed=chicken" },
        { id: 4, name: "Элита ОГЭ", price: 100000, img: "https://api.dicebear.com/7.x/fun-emoji/svg?seed=rich" },
        { id: 5, name: "Миллионер", price: 1000000, img: "https://api.dicebear.com/7.x/fun-emoji/svg?seed=gold" }
    ];

    // ЛОГИКА
    let balance = localStorage.getItem('th_bal') ? parseInt(localStorage.getItem('th_bal')) : 5000;
    let inventory = JSON.parse(localStorage.getItem('th_inv')) || [];
    let svoItems = [];
    let selectedUpgItem = null;
    let wonItem = null;

    function save() {
        localStorage.setItem('th_bal', balance);
        localStorage.setItem('th_inv', JSON.stringify(inventory));
        document.getElementById('balance-display').innerText = balance.toLocaleString();
    }
    save();

    function switchPage(p) {
        document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
        document.getElementById('page-' + p).classList.add('active');
    }

    // РЕНДЕР КЕЙСОВ
    const grid = document.getElementById('cases-grid');
    cases.forEach(c => {
        grid.innerHTML += `
            <div class="case-card" onclick="previewCase(${c.id})">
                <img src="${c.img}">
                <h3>${c.name}</h3>
                <div class="price">${c.price.toLocaleString()} ₽</div>
            </div>
        `;
    });

    // ПРЕВЬЮ
    function previewCase(id) {
        const c = cases.find(x => x.id === id);
        const modal = document.getElementById('preview-modal');
        const pGrid = document.getElementById('prev-grid');
        pGrid.innerHTML = '';
        
        // Показываем предметы, которые теоретически могут выпасть
        const possible = globalSkins.filter(s => s.price >= c.price * 0.1 && s.price <= c.price * 5).slice(0, 15);
        possible.forEach(s => {
            pGrid.innerHTML += `
                <div class="preview-item" style="border-color:${rarities[s.rarity].color}">
                    <img src="${s.img}"><br><small>${s.name}</small>
                </div>`;
        });

        document.getElementById('prev-name').innerText = c.name;
        const btn = document.getElementById('btn-open-now');
        btn.innerText = `Открыть за ${c.price.toLocaleString()} ₽`;
        btn.onclick = () => { closePreview(); openCase(id); };
        modal.style.display = 'flex';
    }

    function closePreview() { document.getElementById('preview-modal').style.display = 'none'; }

    // МЕХАНИКА ДРОПА (70% слив, 10% окуп до 5х)
    function getDrop(price) {
        const roll = Math.random() * 100;
        let min, max;
        if (roll < 70) { min = 0.1; max = 0.8; } // Слив в 10 раз возможен (0.1)
        else if (roll < 90) { min = 0.8; max = 1.2; } // Около нуля
        else { min = 1.2; max = 5.0; } // Окуп МАКСИМУМ 5х

        const targetMin = price * min;
        const targetMax = price * max;
        let pool = globalSkins.filter(s => s.price >= targetMin && s.price <= targetMax);
        if (pool.length === 0) pool = [globalSkins[Math.floor(Math.random()*globalSkins.length)]];
        return pool[Math.floor(Math.random() * pool.length)];
    }

    function openCase(id) {
        const c = cases.find(x => x.id === id);
        if (balance < c.price) return alert("Не хватает денег!");
        balance -= c.price; save();

        wonItem = getDrop(c.price);
        const modal = document.getElementById('roulette-modal');
        const tape = document.getElementById('tape');
        modal.style.display = 'flex';
        document.getElementById('roulette-actions').style.display = 'none';
        document.getElementById('roulette-status').innerText = "Открываем...";

        tape.style.transition = 'none';
        tape.style.transform = 'translateX(0)';
        
        let html = '';
        for(let i=0; i<60; i++) {
            let s = i === 50 ? wonItem : globalSkins[Math.floor(Math.random()*globalSkins.length)];
            html += `<div class="item" style="border-color:${rarities[s.rarity].color}"><img src="${s.img}"></div>`;
        }
        tape.innerHTML = html;

        setTimeout(() => {
            tape.style.transition = 'transform 7s cubic-bezier(0.1, 0, 0.05, 1)';
            tape.style.transform = `translateX(-${50 * 170 - 400}px)`;
        }, 50);

        setTimeout(() => {
            document.getElementById('roulette-status').innerText = `Выпало: ${wonItem.name}`;
            document.getElementById('btn-sell-won').innerText = `Продать за ${wonItem.price} ₽`;
            document.getElementById('roulette-actions').style.display = 'flex';
        }, 7200);
    }

    function collectItem() { inventory.push(wonItem); save(); document.getElementById('roulette-modal').style.display = 'none'; }
    function sellWon() { balance += wonItem.price; save(); document.getElementById('roulette-modal').style.display = 'none'; }

    // ИНВЕНТАРЬ
    function renderProfile() {
        const g = document.getElementById('inventory-grid');
        g.innerHTML = '';
        inventory.forEach((s, i) => {
            g.innerHTML += `
                <div class="inv-item" style="border-color:${rarities[s.rarity].color}">
                    <img src="${s.img}">
                    <div>${s.name}</div>
                    <div style="color:var(--accent)">${s.price} ₽</div>
                    <button class="btn-red" style="padding:5px; margin-top:5px;" onclick="sellItem(${i})">Продать</button>
                </div>`;
        });
    }

    function sellItem(i) { balance += inventory[i].price; inventory.splice(i, 1); save(); renderProfile(); }
    function sellAll() { inventory.forEach(s => balance += s.price); inventory = []; save(); renderProfile(); }

    // АПГРЕЙД & SVO
    let currentMode = '';
    function openMiniInv(mode) {
        currentMode = mode;
        const g = document.getElementById('mini-inv-grid');
        g.innerHTML = '';
        inventory.forEach((s, i) => {
            g.innerHTML += `<div class="inv-item" onclick="selectFor('${mode}', ${i})"><img src="${s.img}"><br>${s.name}</div>`;
        });
        document.getElementById('mini-inv-modal').style.display = 'flex';
    }
    function closeMiniInv() { document.getElementById('mini-inv-modal').style.display = 'none'; }

    function selectFor(mode, i) {
        const s = inventory[i];
        if (mode === 'upgrade') {
            selectedUpgItem = { ...s, index: i };
            document.getElementById('upg-my-slot').innerHTML = `<img src="${s.img}">`;
            document.getElementById('upg-my-price').innerText = s.price + " ₽";
            // Цель - скин в 2 раза дороже
            const target = globalSkins.filter(x => x.price > s.price * 1.5).sort((a,b) => a.price - b.price)[0];
            document.getElementById('upg-target-slot').innerHTML = `<img src="${target.img}">`;
            document.getElementById('upg-target-price').innerText = target.price + " ₽";
            const chance = Math.floor((s.price / target.price) * 100);
            document.getElementById('upg-chance').innerText = chance + "%";
            document.getElementById('upg-wheel').style.background = `conic-gradient(var(--accent) ${chance}%, #222 ${chance}%)`;
        } else {
            if (svoItems.length < 3) {
                svoItems.push({ ...s, index: i });
                renderSvoSlots();
            }
        }
        closeMiniInv();
    }

    function renderSvoSlots() {
        const div = document.getElementById('svo-slots');
        div.innerHTML = '';
        svoItems.forEach(s => div.innerHTML += `<div class="inv-item"><img src="${s.img}"></div>`);
    }

    function doUpgrade() {
        if (!selectedUpgItem) return alert("Выбери предмет!");
        const chance = parseInt(document.getElementById('upg-chance').innerText);
        const win = Math.random() * 100 < chance;
        inventory.splice(selectedUpgItem.index, 1);
        if (win) {
            const targetPrice = parseInt(document.getElementById('upg-target-price').innerText);
            const newItem = globalSkins.find(x => x.price === targetPrice);
            inventory.push(newItem);
            alert("УСПЕХ!");
        } else alert("СГОРЕЛ!");
        selectedUpgItem = null;
        save(); switchPage('profile'); renderProfile();
    }

    function doSvo() {
        if (svoItems.length < 3) return alert("Нужно 3 предмета!");
        const total = svoItems.reduce((a, b) => a + b.price, 0);
        // Контракт дает скин от 0.5x до 2.0x суммы
        const resultPrice = total * (0.5 + Math.random() * 1.5);
        const newItem = globalSkins.reduce((prev, curr) => Math.abs(curr.price - resultPrice) < Math.abs(prev.price - resultPrice) ? curr : prev);
        
        // Удаляем
        const indices = svoItems.map(x => x.index).sort((a,b) => b-a);
        indices.forEach(idx => inventory.splice(idx, 1));
        
        inventory.push(newItem);
        svoItems = [];
        alert("Контракт подписан! Получено: " + newItem.name);
        save(); switchPage('profile'); renderProfile();
    }
</script>
</body>
</html>
